# config.yaml - Configuración del proyecto NYC TLC

# Rutas del proyecto (relativas a la raíz)
rutas:
  data: "data"
  outputs: "outputs"

# Configuración de MinIO (Object Storage)
minio:
  # Las credenciales se cargan desde credentials.json en la raíz del proyecto
  
  # Bucket por defecto para operaciones
  default_bucket: "nyc-tlc-data"
  
  # Prefijos para organizar datos
  prefijos:
    raw: "raw"           # Datos sin procesar
    processed: "processed"  # Datos procesados
    outputs: "outputs"   # Resultados finales
    temp: "temp"         # Archivos temporales

# Configuración de descarga
descarga:
  # Años a descargar por defecto
  start_year: 2020
  end_year: 2025
  
  # Meses a descargar por defecto (1-12)
  start_month: 1
  end_month: 12
  
  # URL base de TLC
  url_base: "https://d37ci6vzurychx.cloudfront.net/trip-data"
  
  # Configuración de red
  timeout_segundos: 30
  tamaño_chunk: 8192
  
# Servicios de taxi a descargar
servicios:
  yellow:
    nombre: "Yellow Taxi"
    habilitado: true
    
  green:
    nombre: "Green Taxi"
    habilitado: true
    
  fhv:
    nombre: "For-Hire Vehicles"
    habilitado: true
    
  fhvhv:
    nombre: "High Volume FHV"
    habilitado: true

# Eventos de Nueva York City a descargar
eventos:
  url_base: "https://data.cityofnewyork.us"
  dataset_id: "bkfu-528j"
  
  # Años a descargar por defecto
  start_year: 2020
  end_year: 2025
  
  # Meses a descargar por defecto (1-12)
  start_month: 1
  end_month: 12
  
  socrata_limit: 10000
  timeout_segundos: 60

# Datos meteorológicos de Open-Meteo
meteo:
  # Docs: https://open-meteo.com/en/docs/historical-weather-api
  url_base: "https://archive-api.open-meteo.com/v1/archive"

  # Años a descargar por defecto
  start_year: 2020
  end_year: 2025
  
  # Meses a descargar por defecto (1-12)
  start_month: 1
  end_month: 12
  
  # Coordenadas de NYC (Times Square)
  latitude: 40.7128
  longitude: -74.0060
  
  # Zona horaria
  timezone: "America/New_York"
  
  # Configuración de red
  timeout: 120