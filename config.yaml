# config.yaml - Configuración del proyecto NYC TLC

# Rutas del proyecto (relativas a la raíz)
rutas:
  data: "data"
  outputs: "outputs"
  config: "config"

# Configuración de descarga
descarga:
  # Años a descargar por defecto
  start_year: 2023
  end_year: 2025
  
  # Meses a descargar por defecto (1-12)
  start_month: 1
  end_month: 12
  
  # URL base de TLC
  url_base: "https://d37ci6vzurychx.cloudfront.net/trip-data"
  
  # Configuración de red
  timeout_segundos: 30
  tamaño_chunk: 8192
  
# Servicios de taxi a descargar
servicios:
  yellow:
    nombre: "Yellow Taxi"
    habilitado: true
    
  green:
    nombre: "Green Taxi"
    habilitado: true
    
  fhv:
    nombre: "For-Hire Vehicles"
    habilitado: false
    
  fhvhv:
    nombre: "High Volume FHV"
    habilitado: true

# Eventos de Nueva York City a descargar
eventos:
  url_base: "https://data.cityofnewyork.us"
  dataset_id: "bkfu-528j"
  
  # Años a descargar por defecto
  start_year: 2023
  end_year: 2025
  
  # Meses a descargar por defecto (1-12)
  start_month: 1
  end_month: 12
  
  socrata_limit: 10000
  timeout_segundos: 60

# Datos meteorológicos de Open-Meteo
meteo:
  # Docs: https://open-meteo.com/en/docs/historical-weather-api
  url_base: "https://archive-api.open-meteo.com/v1/archive"

  # Años a descargar por defecto
  start_year: 2023
  end_year: 2025
  
  # Meses a descargar por defecto (1-12)
  start_month: 1
  end_month: 12
  
  # Coordenadas de NYC (Times Square)
  latitude: 40.7128
  longitude: -74.0060
  
  # Zona horaria
  timezone: "America/New_York"
  
  # Configuración de red
  timeout: 120

# Configuración de Spark optimizada para 28GB
spark:
  app_name: "NYC_Transport_Stress_SaaS"
  # 'local[*]' usa todos los núcleos disponibles
  master: "local[*]"
  driver_memory: "8g"
  executor_memory: "4g"
  # El puerto de la UI (por defecto 4040, lo cambiamos para evitar conflictos)
  ui_port: 4050
  # Particiones: para 28GB local, 200 suele estar bien, pero para dev mejor 8-16
  shuffle_partitions: 16
  # Formato de guardado por defecto
  default_format: "parquet"
